name: Build

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Set up environment variables
      run: |
        echo "GPR_USER=${{ github.actor }}" >> $GITHUB_ENV
        echo "GPR_KEY=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
        echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
        echo "KEYSTORE_BASE64=${{ secrets.KEYSTORE_BASE64 }}" >> $GITHUB_ENV

    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Check signing env
      run: |
        test -n "$KEY_ALIAS" && echo "KEY_ALIAS set"
        test -n "$KEY_PASSWORD" && echo "KEY_PASSWORD set"
        test -n "$KEYSTORE_PASSWORD" && echo "KEYSTORE_PASSWORD set"
        echo "KEYSTORE_BASE64 length: ${#KEYSTORE_BASE64}"

    - name: Build release APK
      run: ./gradlew clean assembleRelease

    - name: Show APK outputs
      run: find app/build/outputs/apk -maxdepth 3 -type f | sort

    - name: Archive APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: |
          app/build/outputs/apk/release/app-release.apk
          app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Create Release
      id: create_release
      uses: ncipollo/release-action@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: ${{ github.ref_name }}
        prerelease: false
        generateReleaseNotes: true
        allowUpdates: true
        artifacts: app/build/outputs/apk/release/app-release.apk, app/build/outputs/apk/release/app-release-unsigned.apk, app/karoo-theme.png
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
